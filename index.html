<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tactical Blindness Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }
        
        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            opacity: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <script>
        const channel = "reunny";
        
        const flashAudio = new Audio("flash.mp3");

        function triggerFlash() {
            flashAudio.currentTime = 0;
            flashAudio.play().catch(()=>{});
            
            gsap.killTweensOf("#flash-overlay");
            gsap.fromTo("#flash-overlay", 
                { opacity: 1 }, 
                { opacity: 0, duration: 4.5, ease: "power2.out" }
            );
        }

        ComfyJS.onChat = (user, message, flags, self, extra) => {
            if (flags.customReward) {
                if (extra.customRewardId === "f7b34404-08fd-4719-b47a-e1461fd33916") {
                    triggerFlash();
                }
            }
        };

        ComfyJS.Init(channel);
    </script>
</body>
</html>
